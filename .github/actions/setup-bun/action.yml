name: Setup Bun
description: Setup Bun, restore dependency cache, and install dependencies.

inputs:
  bun-version:
    description: Bun version to install.
    required: false
    default: "1.3.6"
  cache-key:
    description: Cache key prefix.
    required: false
    default: bun

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
        key: ${{ runner.os }}-${{ inputs.cache-key }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.cache-key }}-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
